<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <defs>
    <linearGradient id="overlay-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#08111F" stop-opacity="0.92"/>
      <stop offset="48%" stop-color="#0B1526" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0B1526" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13233B" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#0D1728" stop-opacity="0.76"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <image href="cover-bg.png" x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid slice" />
  <rect width="1600" height="900" fill="url(#overlay-left)" />

  <g transform="translate(110, 0)">
    <text x="0" y="235" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#66A5FF" letter-spacing="3">HAPPY-LLM / CHAPTER 6</text>
    <text x="0" y="345" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF">Transformers 训练流程实践</text>
    <text x="0" y="418" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="300" fill="#D4E0F7">从预训练、SFT 到 LoRA 的框架化训练骨架</text>
    <text x="0" y="470" font-family="sans-serif" font-size="16" font-weight="bold" fill="#F7C948" letter-spacing="2">INIT / DATASET / TRAINER / DEEPSPEED / LORA</text>

    <rect x="0" y="565" width="490" height="150" rx="24" fill="url(#panel)" stroke="#2C4C78" stroke-width="2" filter="url(#shadow)" />
    <text x="34" y="612" font-family="'PingFang SC', sans-serif" font-size="21" font-weight="bold" fill="#BFD0F0">[ chapter summary ]</text>
    <text x="34" y="655" font-family="'PingFang SC', sans-serif" font-size="18" fill="#FFFFFF">模型初始化、预训练数据、Trainer 与</text>
    <text x="34" y="686" font-family="'PingFang SC', sans-serif" font-size="18" fill="#FFFFFF">DeepSpeed、SFT 标签构造、LoRA 微调。</text>
  </g>

  <g transform="translate(110, 95)">
    <rect x="0" y="0" width="126" height="34" rx="17" fill="#163055" stroke="#3B71AF" stroke-width="1.5" />
    <text x="63" y="22" font-family="sans-serif" font-size="13" font-weight="bold" fill="#DCE9FF" text-anchor="middle">TRANSFORMERS</text>
    <rect x="142" y="0" width="86" height="34" rx="17" fill="#17314D" stroke="#E1A93B" stroke-width="1.5" />
    <text x="185" y="22" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFF3D2" text-anchor="middle">SFT</text>
    <rect x="244" y="0" width="98" height="34" rx="17" fill="#1E2F45" stroke="#F08D49" stroke-width="1.5" />
    <text x="293" y="22" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FFE2D0" text-anchor="middle">LORA</text>
  </g>
</svg>
