# 首页展示的内容分区
mainSections = ["post"]
# RSS 输出完整内容
rssFullContent = true
favicon        = "img/avatar.jpg"

# 文章排序方式
SortBy = "default"

[footer]
    since      = 2025
    customText = ""

[dateFormat]
    published   = "2006-01-02"
    lastUpdated = "2006-01-02"

[sidebar]
    emoji    = "💻"
    subtitle = "CS Undergrad @ ZJUT · AI & CV Enthusiast"
    avatar   = "avatar.jpg"

[article]
    headingAnchor = true
    math          = true
    readingTime   = true
    toc           = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 15 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

## 评论暂时关闭，后续可接入 giscus / utterances
[comments]
    enabled  = false
    provider = ""
